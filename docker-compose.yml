x-optional-env-file: &optional-env-file
  - path: .env
    required: false

services:
  postgres:
    image: postgres:16-alpine
    env_file: *optional-env-file
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payments}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-payments}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    env_file: *optional-env-file
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  webhook-echo:
    build: .
    env_file: *optional-env-file
    environment:
      SERVICE_NAME: webhook-echo
    command: ["uv", "run", "--no-dev", "uvicorn", "app.webhook_echo:app", "--host", "0.0.0.0", "--port", "9000", "--no-access-log"]
    ports:
      - "${WEBHOOK_ECHO_PORT:-9000}:9000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  migrate:
    build: .
    env_file: *optional-env-file
    environment:
      SERVICE_NAME: migrate
    command: ["uv", "run", "--no-dev", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file: *optional-env-file
    environment:
      SERVICE_NAME: api
    command: ["uv", "run", "--no-dev", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/health', headers={'X-API-Key': os.environ.get('API_KEY', 'change-me')}); urllib.request.urlopen(req, timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  outbox-publisher:
    build: .
    env_file: *optional-env-file
    environment:
      SERVICE_NAME: outbox-publisher
    command: ["uv", "run", "--no-dev", "python", "-m", "app.infrastructure.messaging.outbox_worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  consumer:
    build: .
    env_file: *optional-env-file
    environment:
      SERVICE_NAME: consumer
    command: ["uv", "run", "--no-dev", "faststream", "run", "app.infrastructure.messaging.consumer:app"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      webhook-echo:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
